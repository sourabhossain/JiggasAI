{% extends "base_auth.html" %}
{% block title %}Sign in — JiggasAI{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full max-w-sm">

    <div class="flex items-center gap-3 mb-8">
      <div class="w-9 h-9 rounded-xl bg-accent flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <span class="text-xl font-semibold text-primary">JiggasAI</span>
    </div>

    <h1 class="text-2xl font-semibold text-gray-900 mb-1">Welcome back</h1>
    <p class="text-sm text-gray-500 mb-6">Sign in to your account</p>

    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
      <div class="bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-4 border border-red-100">
        Invalid username or password. Please try again.
      </div>
      {% endif %}

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
        <input type="text" name="username" autofocus required autocomplete="username"
          class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition">
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
        <div class="relative">
          <input type="password" name="password" id="password-input" required autocomplete="current-password"
            class="w-full px-3.5 py-2.5 pr-11 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition">
          <button type="button" id="toggle-password" onclick="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition"
            aria-label="Show password">
            <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.186-3.411M6.53 6.53A9.97 9.97 0 0112 5c4.477 0 8.268 2.943 9.542 7a10.05 10.05 0 01-4.132 5.411M3 3l18 18"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 00-3-3M12 15a3 3 0 01-2.83-2"/>
            </svg>
          </button>
        </div>
      </div>

      <input type="hidden" name="next" value="{{ next }}">

      <button type="submit"
        class="w-full bg-accent text-white py-2.5 rounded-xl text-sm font-medium hover:bg-blue-600 active:bg-blue-700 transition">
        Sign in
      </button>
    </form>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password-input');
  const eyeIcon = document.getElementById('icon-eye');
  const eyeOffIcon = document.getElementById('icon-eye-off');
  const btn = document.getElementById('toggle-password');

  if (input.type === 'password') {
    input.type = 'text';
    eyeIcon.classList.add('hidden');
    eyeOffIcon.classList.remove('hidden');
    btn.setAttribute('aria-label', 'Hide password');
  } else {
    input.type = 'password';
    eyeIcon.classList.remove('hidden');
    eyeOffIcon.classList.add('hidden');
    btn.setAttribute('aria-label', 'Show password');
  }
}
</script>
{% endblock %}
